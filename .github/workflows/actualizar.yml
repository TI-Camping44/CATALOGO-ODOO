name: Actualizar Catálogo Odoo

on:
  schedule:
    - cron: '0 8 * * *' # Se ejecuta de forma automática todos los días a las 8:00 AM UTC
  workflow_dispatch: # Activa un botón para que puedas ejecutarlo manualmente cuando quieras

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ejecutar Script de Odoo
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USER: ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: python generar_catalogo.py

      - name: Guardar y subir index.html al repositorio
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualización automática de precios desde Odoo"
          git push origin main
